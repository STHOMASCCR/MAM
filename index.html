<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test rotation</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      transition: background .2s ease;
    }
    .card {
      width: min(92vw, 900px);
      padding: 24px;
      border-radius: 20px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: 0 20px 40px rgba(0,0,0,.25);
    }
    h1 { margin: 0 0 12px; font-size: 28px; }
    .status { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .box {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      min-height: 80px;
    }
    .small { opacity: .85; font-size: 14px; }

    @media (orientation: landscape) {
      body { background: #14532d; }
      .grid { grid-template-columns: 1fr 1fr; }
      .status::after { content: "LANDSCAPE détecté"; color: #86efac; }
    }

    @media (orientation: portrait) {
      body { background: #1e3a8a; }
      .status::after { content: "PORTRAIT détecté"; color: #93c5fd; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Test rotation viewer</h1>
    <div class="status"></div>
    <div class="grid">
      <div class="box">Bloc A</div>
      <div class="box">Bloc B</div>
      <div class="box">Largeur viewport: <span id="w"></span> px</div>
      <div class="box">Hauteur viewport: <span id="h"></span> px</div>
    </div>
    <p class="small">Attendu : fond bleu + 1 colonne en portrait, fond vert + 2 colonnes en paysage.</p>
  </div>
  <script>
    function updateSize() {
      document.getElementById('w').textContent = window.innerWidth;
      document.getElementById('h').textContent = window.innerHeight;
    }
    updateSize();
    window.addEventListener('resize', updateSize);
    window.addEventListener('orientationchange', updateSize);
  </script>
</body>
</html>
